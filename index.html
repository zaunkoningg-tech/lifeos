/* ---------- Flexible per-set lift logger ----------------------------------
   - Each exercise is a card block with a free combobox name picker (type-in or
     pick from the full known-exercise dropdown).
   - Every set has independent reps + kg. Sets add/remove/duplicate dynamically.
   - Add ad-hoc exercises beyond the planned session. One-tap "repeat last".
   - Live per-exercise volume, per-set Δ vs last session, and a session total. */
function renderLiftLogger(d, session, lib){
  const last = findLastSession(session);
  const lastMap = {};                          // name -> {name, sets:[{r,kg}]}
  if(last){ (last.lifts[session]||[]).forEach(e=> lastMap[e[0]] = liftRowToSets(e)); }

  const todayMap = {};
  (d.lifts[session]||[]).forEach(e=> todayMap[e[0]] = liftRowToSets(e));

  // Build the working model. Planned exercises first (pre-filled from today's
  // save if present, tracking a swapped-in alternative), then any extra
  // exercises already logged today that aren't part of the plan.
  const model = [];
  const consumed = new Set();
  lib.ex.forEach(ex=>{
    let selName = ex.n, logged = todayMap[ex.n];
    if(!logged){ for(const c of [ex.n, ...(EX_ALTS[ex.n]||[])]){ if(todayMap[c]){ selName=c; logged=todayMap[c]; break; } } }
    consumed.add(selName);
    model.push({
      name: selName, target:`${ex.s}×${ex.r}`, block: ex.b, ss: ex.ss, planned:true,
      sets: logged ? logged.sets.map(s=>({...s})) : [{r:null,kg:null}]
    });
  });
  (d.lifts[session]||[]).forEach(e=>{
    if(consumed.has(e[0])) return;
    consumed.add(e[0]);
    model.push({ name:e[0], target:"", block:"Extra", ss:0, planned:false, sets: liftRowToSets(e).sets.map(s=>({...s})) });
  });

  // Exercise picker data: all names + metadata for a grouped, searchable dropdown.
  const allNames = allExerciseNames();
  const sessionNames = ((LIBRARY[session] && LIBRARY[session].ex) || []).map(e=>e.n);
  const recentNames = Object.keys(collectLiftHistory()).sort((a,b)=>a.localeCompare(b));
  const blockOf = {}; for(const sess in LIBRARY) (LIBRARY[sess].ex||[]).forEach(e=>{ if(!blockOf[e.n]) blockOf[e.n]=e.b; });
  const card = el(`<div class="card"><h3>Progressive overload — ${session} log${last?` <span class="hint">(last: ${last.date})</span>`:` <span class="hint">(first time logged)</span>`}</h3></div>`);

  // Build the grouped result list for a query + the row's current exercise.
  function exPickerGroups(q, b){
    q=(q||"").trim().toLowerCase();
    const match = n => { const ln=n.toLowerCase(); return !q || ln.includes(q) || subseq(q, ln); };
    const used=new Set(), groups=[];
    const add=(label, names)=>{ const items=[]; names.forEach(n=>{ if(!used.has(n) && match(n)){ used.add(n); items.push(n); } }); if(items.length) groups.push({label, items:items.slice(0,8)}); };
    add("This session", sessionNames);
    add("Alternatives", EX_ALTS[b.name]||[]);
    add("Recent", recentNames);
    add("All", allNames);
    return groups;
  }

  // Toolbar — session-wide automation
  const toolbar = el(`<div class="log-toolbar"></div>`);
  const repeatBtn = el(`<button class="addbtn" title="Copy every set from your last ${esc(session)} session">↻ Repeat last session</button>`);
  repeatBtn.onclick = ()=>{
    if(!last){ toast("No previous session to copy"); return; }
    model.forEach(b=>{ const lm=lastMap[b.name]; if(lm) b.sets = lm.sets.map(s=>({...s})); });
    // pull in any last-session exercise not already on screen
    (last.lifts[session]||[]).forEach(e=>{ if(!model.some(b=>b.name===e[0])) model.push({name:e[0], target:"", block:"Extra", ss:0, planned:false, sets: liftRowToSets(e).sets.map(s=>({...s}))}); });
    renderBlocks(); toast("Filled from last session");
  };
  toolbar.appendChild(repeatBtn);
  card.appendChild(toolbar);

  const blocks = el(`<div class="ex-blocks"></div>`);
  card.appendChild(blocks);

  const totalLine = el(`<div class="log-total"></div>`);
  const updateTotals = ()=>{
    let sets=0, vol=0, lastVol=0;
    model.forEach(b=>{
      b.sets.forEach(s=>{ if(s.r!=null||s.kg!=null){ sets++; vol+=(s.r||0)*(s.kg||0); } });
      const lm=lastMap[b.name]; if(lm) lm.sets.forEach(s=>{ lastVol+=(s.r||0)*(s.kg||0); });
    });
    const dv = vol-lastVol;
    const cmp = (last && lastVol>0) ? ` · vs last <span class="${dv>0?'review-yes':dv<0?'review-no':'muted'}">${dv>=0?'+':''}${dv.toLocaleString()}</span>` : "";
    totalLine.innerHTML = `<b>${sets}</b> sets · total volume <b>${vol.toLocaleString()}</b> kg·reps${cmp}`;
  };

  function setDeltaHTML(name, i, kg){
    const lm = lastMap[name]; const ls = lm && lm.sets[i];
    if(!ls || ls.kg==null || kg==null) return "";
    const diff = +(kg-ls.kg).toFixed(1);
    if(diff>0) return `<span class="delta up">↑+${diff}</span>`;
    if(diff<0) return `<span class="delta down">↓${diff}</span>`;
    return `<span class="delta flat">→</span>`;
  }

  function renderBlocks(){
    blocks.innerHTML = "";
    model.forEach((b, bi)=>{
      const lm = lastMap[b.name];
      const lastTxt = lm ? lm.sets.map(s=>`${s.r??"–"}×${s.kg??"–"}`).join(", ") : "—";
      const tags = `${b.block?`<span class="block-tag">${esc(b.block)}</span>`:""}${b.ss?`<span class="ss-tag">superset</span>`:""}`;
      const block = el(`<div class="ex-block${b.ss?" ss":""}">
        <div class="ex-head">
          <div class="ex-pick-wrap"><input class="ex-pick" value="${esc(b.name)}" placeholder="Type or pick an exercise…" autocomplete="off"><div class="ex-dd" style="display:none"></div></div>
          ${tags}
          <button class="ex-rpt" title="Copy this exercise from last session">↻</button>
          <button class="ex-del" title="Remove this exercise">✕</button>
        </div>
        <div class="ex-sub">${b.target?`target ${esc(b.target)} · `:""}last: ${esc(lastTxt)}</div>
        <div class="set-list"></div>
        <div class="ex-foot"><button class="set-add">+ Add set</button><span class="ex-vol"></span></div>
      </div>`);
      const pick = block.querySelector(".ex-pick");
      const setList = block.querySelector(".set-list");
      const volSpan = block.querySelector(".ex-vol");

      const refreshVol = ()=>{
        const vol = b.sets.reduce((a,s)=>a+(s.r||0)*(s.kg||0),0);
        const topKg = b.sets.reduce((m,s)=>Math.max(m,s.kg||0),0);
        const pr = (topKg>0 && isPR(b.name, topKg)) ? ` <span class="pr">PR</span>` : "";
        volSpan.innerHTML = vol>0 ? `vol ${vol.toLocaleString()} kg·reps${pr}` : "";
        updateTotals();
      };

      const drawSets = ()=>{
        setList.innerHTML = "";
        b.sets.forEach((s, si)=>{
          const row = el(`<div class="set-row">
            <span class="sidx">Set ${si+1}</span>
            <input class="s-r" type="number" inputmode="numeric" placeholder="reps" value="${s.r??""}"><span class="unit">reps</span>
            <input class="s-kg" type="number" inputmode="decimal" step="0.5" placeholder="kg" value="${s.kg??""}"><span class="unit">kg</span>
            <span class="set-delta">${setDeltaHTML(b.name, si, s.kg)}</span>
            <button class="set-dup" title="Duplicate this set">⧉</button>
            <button class="set-del" title="Remove this set">✕</button>
          </div>`);
          const rIn = row.querySelector(".s-r"), kgIn = row.querySelector(".s-kg"), dCell = row.querySelector(".set-delta");
          rIn.addEventListener("input", ()=>{ s.r = num(rIn.value); refreshVol(); });
          kgIn.addEventListener("input", ()=>{ s.kg = num(kgIn.value); dCell.innerHTML = setDeltaHTML(b.name, si, s.kg); refreshVol(); });
          row.querySelector(".set-dup").onclick = ()=>{ b.sets.splice(si+1,0,{...s}); drawSets(); refreshVol(); };
          row.querySelector(".set-del").onclick = ()=>{ b.sets.splice(si,1); if(!b.sets.length) b.sets.push({r:null,kg:null}); drawSets(); refreshVol(); };
          setList.appendChild(row);
        });
      };

      const exdd = block.querySelector(".ex-dd");
      const showExDD = ()=>{
        const groups = exPickerGroups(pick.value, b);
        exdd.innerHTML="";
        if(!groups.length){ exdd.style.display="none"; return; }
        groups.forEach(g=>{
          exdd.appendChild(el(`<div class="ex-dd-grp">${esc(g.label)}</div>`));
          g.items.forEach(n=>{
            const it=el(`<div class="ex-dd-item"><span class="nm">${esc(n)}</span>${blockOf[n]?`<span class="block-tag">${esc(blockOf[n])}</span>`:""}</div>`);
            it.addEventListener("mousedown", e=>{ e.preventDefault(); b.name=n; renderBlocks(); }); // mousedown beats blur
            exdd.appendChild(it);
          });
        });
        exdd.style.display="block";
      };
      pick.addEventListener("input", ()=>{ b.name = pick.value; showExDD(); });
      pick.addEventListener("focus", showExDD);
      pick.addEventListener("blur", ()=>{ setTimeout(()=>{ exdd.style.display="none"; }, 150); });
      pick.addEventListener("change", ()=>{ b.name = pick.value.trim(); renderBlocks(); }); // free type-in commits + refreshes last/Δ
      block.querySelector(".set-add").onclick = ()=>{ const prev=b.sets[b.sets.length-1]||{}; b.sets.push({r:prev.r??null, kg:prev.kg??null}); drawSets(); refreshVol(); };
      block.querySelector(".ex-del").onclick = ()=>{ model.splice(bi,1); renderBlocks(); };
      block.querySelector(".ex-rpt").onclick = ()=>{ const lmm=lastMap[b.name]; if(!lmm){ toast("No last data for this exercise"); return; } b.sets = lmm.sets.map(x=>({...x})); drawSets(); refreshVol(); };

      drawSets(); refreshVol();
      blocks.appendChild(block);
    });
    updateTotals();
  }
  renderBlocks();

  const addExBtn = el(`<button class="addbtn" style="margin-top:4px">+ Add exercise</button>`);
  addExBtn.onclick = ()=>{ model.push({name:"", target:"", block:"Extra", ss:0, planned:false, sets:[{r:null,kg:null}]}); renderBlocks();
    // focus the new picker
    const picks = blocks.querySelectorAll(".ex-pick"); if(picks.length) picks[picks.length-1].focus(); };

  card.appendChild(totalLine);

  const saveBtn = el(`<button class="btn btn-primary" style="margin-top:14px">Save ${session} log</button>`);
  saveBtn.onclick = ()=>{
    const out = [];
    model.forEach(b=>{
      const name = (b.name||"").trim();
      if(!name) return;
      const row = setsToLiftRow(name, b.sets);
      if(row) out.push(row);
    });
    d.lifts[session] = out;
    if(out.length){ const cl=d.cl.split(""); cl[16]="1"; d.cl=cl.join(""); } // auto-tick "lifts logged"
    save();
    toast("Lift log saved");
    render();
  };
  card.appendChild(saveBtn);
  if(lib.ex.some(e=>e.ss)) card.appendChild(el(`<div class="hint" style="margin-top:8px">Superset rows are performed and logged as a pair — rest 90 sec after the pair.</div>`));
  return card;
}

/* ---------- Training history — look up past sessions -----------------------
   Browse previously logged training days (filterable to the current session
   type) and expand any day to its full per-exercise / per-set breakdown. */
function sessionVolume(rows){
  return (rows||[]).reduce((tot,e)=>{
    return tot + liftRowToSets(e).sets.reduce((a,x)=>a+(x.r||0)*(x.kg||0),0);
  },0);
}
function renderTrainingHistory(currentSession){
  const isRest = currentSession==="Rest" || !currentSession;
  const scope = isRest ? "all" : trainHistScope;     // no per-type filter on rest days
  const card = el(`<div class="card"><h3>Training history <span class="hint">(past sessions — click a day to expand)</span></h3></div>`);

  // Scope toggle (only meaningful on a training day)
  if(!isRest){
    const pills = el(`<div class="pills" style="margin-bottom:12px"></div>`);
    [["session",`This type (${currentSession})`],["all","All sessions"]].forEach(([k,lab])=>{
      const p = el(`<button class="pill ${scope===k?"active":""}">${esc(lab)}</button>`);
      p.onclick = ()=>{ trainHistScope=k; render(); };
      pills.appendChild(p);
    });
    card.appendChild(pills);
  }

  // Collect logged training days (newest first), filtered by scope.
  const days = Object.keys(DATA.days).filter(k=>{
    const lifts = DATA.days[k].lifts;
    if(!lifts || !Object.keys(lifts).some(s=>(lifts[s]||[]).length)) return false;
    if(scope==="session") return Array.isArray(lifts[currentSession]) && lifts[currentSession].length;
    return true;
  }).sort().reverse();

  if(!days.length){
    card.appendChild(el(`<div class="hint">No ${scope==="session"?`past ${esc(currentSession)} `:""}sessions logged yet. Saved workouts will show up here.</div>`));
    return card;
  }

  const list = el(`<div class="thist-list"></div>`);
  days.forEach(k=>{
    const lifts = DATA.days[k].lifts;
    const sessNames = Object.keys(lifts).filter(s=>(lifts[s]||[]).length);
    let vol=0, exCount=0, hasPR=false;
    sessNames.forEach(s=> (lifts[s]||[]).forEach(e=>{
      exCount++;
      const sets=liftRowToSets(e).sets;
      vol += sets.reduce((a,x)=>a+(x.r||0)*(x.kg||0),0);
      const top=sets.reduce((m,x)=>Math.max(m,x.kg||0),0);
      if(top>0 && isPR(e[0], top)) hasPR=true;
    }));
    const open = trainHistOpen===k;
    const row = el(`<div class="thist-row ${open?"open":""}">
      <div class="thist-head">
        <span class="thist-when"><b>${esc(dowFor(k))}</b> ${esc(k)}</span>
        <span class="thist-sess">${esc(sessNames.join(", "))}</span>
        <span class="thist-sum">${exCount} ex · ${vol.toLocaleString()} vol${hasPR?` <span class="pr">PR</span>`:""}</span>
        <span class="thist-caret">${open?"▾":"▸"}</span>
      </div>
    </div>`);
    row.querySelector(".thist-head").onclick = ()=>{ trainHistOpen = open?null:k; render(); };
    if(open){
      const body = el(`<div class="thist-body"></div>`);
      sessNames.forEach(s=>{
        const sec = el(`<div class="rec-sec"><div class="rec-line" style="font-weight:500">${esc(s)} <span class="muted">· ${sessionVolume(lifts[s]).toLocaleString()} vol</span></div></div>`);
        (lifts[s]||[]).forEach(e=>{
          const sets = liftRowToSets(e).sets;
          const detail = (Array.isArray(e[4]) && e[4].length)
            ? sets.map(x=>`${x.r??"–"}×${x.kg??"–"}`).join(", ")
            : `${e[1]}×${e[2]} @ ${e[3]}kg`;
          const top = sets.reduce((m,x)=>Math.max(m,x.kg||0),0);
          const pr = (top>0 && isPR(e[0], top)) ? ` <span class="pr">PR</span>` : "";
          sec.appendChild(el(`<div class="rec-line muted">${esc(e[0])} — ${esc(detail)}${pr}</div>`));
        });
        body.appendChild(sec);
      });
      row.appendChild(body);
    }
    list.appendChild(row);
  });
  card.appendChild(list);
  return card;
}

function deltaHtml(todayKg, lastKg, exName, kgVal){
  if(todayKg===null) return "";
  if(lastKg===null){
    // No same-session baseline — still flag a PR if it beats this exercise's history elsewhere.
    const pr = isPR(exName, kgVal) ? `<span class="pr">PR</span>` : "";
    return `<span class="delta new">new</span>${pr}`;
  }
  const diff = +(todayKg-lastKg).toFixed(1);
  const pr = isPR(exName, todayKg) ? `<span class="pr">PR</span>` : "";
  if(diff>0)  return `<span class="delta up">↑ +${diff}</span>${pr}`;
  if(diff<0)  return `<span class="delta down">↓ ${diff}</span>`;
  return `<span class="delta flat">→ 0</span>${pr}`;
}
function isPR(exName, kg){
  if(kg===null||kg===undefined) return false;
  let best = -Infinity, seen = false;
  for(const k in DATA.days){
    if(k===todayKey()) continue;
    const lifts = DATA.days[k].lifts||{};
    for(const sess in lifts){
      lifts[sess].forEach(e=>{ if(e[0]===exName){ seen=true; if((+e[3])>best) best=+e[3]; } });
    }
  }
  return seen && kg>best;   // a PR requires prior history to exceed
}
function findLastSession(session){
  const keys = Object.keys(DATA.days).filter(k=>k!==todayKey()).sort().reverse();
  for(const k of keys){
    const lifts = DATA.days[k].lifts;
    if(lifts && lifts[session] && lifts[session].length){ return {date:k, lifts}; }
  }
  return null;
}

/* ---------- Food logger widget (fuzzy search → portion → preview → add) ---------- */
// Self-contained: manages its own DOM between full renders so the search field keeps
// focus while typing. Calls render() only after a food is added.
function foodLoggerWidget(d){
  ensureFoods();
  const wrap = el(`<div class="food-logger"></div>`);
  const recent = recentFoodsStrip(d);            // Feature F — recent foods quick-add
  if(recent) wrap.appendChild(recent);
  const search = el(`<div class="food-search">

  wrap.append(search, detail);

  let sel=null, grams=null;

  function showDD(){
    const res = searchFoods(input.value);

      });

    // Always offer to create a brand-new food from what was typed (no import).
    const add=el(`<div class="food-dd-item food-dd-add"><div class="r1"><span class="nm">+ Add “${esc(q)}” as a new food</span></div><div class="sub">create it now and log it — no import</div></div>`);
    add.addEventListener("mousedown",e=>{ e.preventDefault(); openQuickAdd(q); });
    dd.appendChild(add);
    dd.style.display="block";

    sel=f; grams=+f.usual_portion||100; input.value=f.name;

  }
  // Create a new food from the typed text and log it in one step.
  function openQuickAdd(q){
    dd.style.display="none"; input.value=q; sel=null;

      <div style="margin-top:10px;display:flex;gap:8px;align-items:flex-end"><div style="width:120px"><label class="fld">Log portion (g)</label><input class="in qa-port" type="number" min="0" value="100"></div>

    const grid=form.querySelector(".qa-grid");
    const mk=(lab,ph,val)=>{ const w=el(`<div><label class="fld">${lab}</label></div>`); const i=el(`<input class="in" ${ph==="text"?"":'type="number" step="any"'} value="${val==null?"":val}">`); w.appendChild(i); grid.appendChild(w); return i; };
    const nameI=mk("Name","text",q);
    const catW=el(`<div><label class="fld">Category</label></div>`); const catS=el(`<select class="in"></select>`);
    FOOD_CATEGORIES.forEach(c=>{ const o=el(`<option value="${c}">${c}</option>`); if(c==="other")o.selected=true; catS.appendChild(o); }); catW.appendChild(catS); grid.appendChild(catW);
    const kcalI=mk("kcal","",""), protI=mk("Protein (g)","",""), carbI=mk("Carbs (g)","",""), fatI=mk("Fat (g)","","");
    form.querySelector(".qa-cancel").onclick=()=>{ detail.style.display="none"; input.value=""; input.focus(); };
    form.querySelector(".qa-create").onclick=()=>{
      const name=(nameI.value||"").trim()||q; if(!name){ toast("Enter a name"); return; }
      const g=num(form.querySelector(".qa-port").value)||100;
      const f=addNewFood(name,{ category:catS.value, usual_portion:g,
        per100:{ kcal:num(kcalI.value)||0, protein:num(protI.value)||0, carbs:num(carbI.value)||0, fat:num(fatI.value)||0 } });
      d.food.push(calcFoodEntry(f,g)); recomputeFood(d); save();
      toast(`${f.name} created & logged`); render();
    };
    detail.appendChild(form);
  }
  input.addEventListener("input",showDD);
  input.addEventListener("focus",showDD);
  input.addEventListener("blur",()=>{ dd.style.display="none"; });

  function renderDetail(){
    detail.innerHTML="";
    if(!sel){ detail.style.display="none"; return; }
    detail.style.display="block";

    const row=el(`<div class="ql-row" style="align-items:flex-end">
      <div style="width:110px"><label class="fld">Grams</label><input class="in" id="fl-g" type="number" min="0" value="${grams}"></div>

    </div>`);
    const gInput=row.querySelector("#fl-g");

  return wrap;

function foodPreviewHtml(food, grams){
  if(!grams || grams<=0) return `<div class="hint">Enter grams to see the breakdown.</div>`;
  const e=calcFoodEntry(food,grams);
  let h=`<div class="fp-title">${esc(food.name)} — ${grams}g</div>`;
  h+=`<div class="fp-grid">`+FOOD_MACRO_ROWS.map(([l,u,i])=>
       `<div class="fp-row"><span>${l}</span><b>${e[i]}${u==="kcal"?" kcal":u}</b></div>`).join("")+`</div>`;
  const nz=FOOD_MICRO_ROWS.filter(m=>e[m[2]]>0);   // only non-zero micros
  if(nz.length) h+=`<div class="fp-micros">`+nz.map(m=>
       `<div class="fp-row"><span>${m[0]}</span><b>${e[m[2]]}${m[1]}</b></div>`).join("")+`</div>`;
  return h;
}

  srch.addEventListener("input",()=>{ foodMgrQuery=srch.value; refreshRows(); });

  // Import summary
  if(importSummary){
    const s=importSummary;

      <h3>Import complete — ${esc(s.date)}</h3>
      <div class="rec-line">✓ ${s.added} new food${s.added===1?"":"s"} added</div>
      <div class="rec-line">✓ ${s.updated} food${s.updated===1?"":"s"} updated</div>
      <div class="rec-line">→ ${s.unchanged} food${s.unchanged===1?"":"s"} unchanged</div>

    dismiss.onclick=()=>{ importSummary=null; render(); };
    sum.appendChild(dismiss);
    frag.appendChild(sum);
  }

  // Inline editor (when a food is open)
  if(foodEditId){
    const f=foodById(foodEditId);
    if(f) frag.appendChild(foodEditorCard(f));
  }

  // Table
  const card=el(`<div class="card"><h3>All foods</h3></div>`);
  const table=el(`<table class="dtable">
    <thead><tr><th>Name</th><th>Category</th><th class="r">Portion</th><th class="r">kcal/100g</th>
      <th class="r">Protein/100g</th><th class="r">Logged</th><th></th></tr></thead>
    <tbody></tbody></table>`);
  const tbody=table.querySelector("tbody");
  function refreshRows(){
    tbody.innerHTML="";
    const q=foodMgrQuery.trim().toLowerCase();
    const list=FOODS.foods.filter(f=> !q || f.name.toLowerCase().includes(q) || f.category.toLowerCase().includes(q))
      .slice().sort((a,b)=>a.name.localeCompare(b.name));
    if(!list.length){ tbody.appendChild(el(`<tr><td colspan="7" class="hint">No foods match.</td></tr>`)); return; }
    list.forEach(f=>{
      const tr=el(`<tr>
        <td style="font-weight:500">${esc(f.name)}${f.notes?`<div class="ex-meta">${esc(f.notes)}</div>`:""}</td>
        <td class="muted">${esc(f.category)}</td>
        <td class="r">${f.usual_portion}g</td>
        <td class="r">${Math.round(f.per100.kcal)}</td>
        <td class="r">${f.per100.protein}</td>
        <td class="r muted">${foodLogCount(f.name)}×</td>
        <td class="r" style="white-space:nowrap"></td>
      </tr>`);
      const actions=tr.querySelector("td:last-child");
      const edit=el(`<button class="addbtn">Edit</button>`);
      edit.onclick=()=>{ foodEditId=f.id; render(); };
      const del=el(`<button class="del-btn" title="Delete">🗑</button>`);
      del.onclick=()=>{
        if(!confirm(`Delete "${f.name}" from the database?\n\nThis will not affect past logs.`)) return;
        const i=FOODS.foods.indexOf(f); if(i>=0) FOODS.foods.splice(i,1);
        if(foodEditId===f.id) foodEditId=null;
        invalidateFuse(); saveFoods(); render();
      };
      actions.append(edit," ",del);
      tbody.appendChild(tr);
    });
  }
  refreshRows();
  card.appendChild(table);
  frag.appendChild(card);
  return frag;
}

function renderSchedule(){
  const frag = document.createDocumentFragment();
  const key = schedDate || todayKey();
  const dow = dowOfKey(key);
  const plan = getDayPlan(key);
  const isToday = key===todayKey();

  frag.appendChild(el(`<div><div class="page-title">Schedule</div>
    <div class="page-sub">${DOW_FULL[dow]} · ${key}${isToday?" · today":""} — ${plan.custom?"custom plan":"weekday template"}.</div></div>`));

  // Week strip with prev/next-week arrows — plan any real date, not just a weekday.
  const navRow = el(`<div class="sched-nav"></div>`);
  const prevW = el(`<button class="nav-arrow" title="Previous week">◀</button>`);
  prevW.onclick=()=>{ schedDate = addDaysKey(key,-7); render(); };
  const nextW = el(`<button class="nav-arrow" title="Next week">▶</button>`);
  nextW.onclick=()=>{ schedDate = addDaysKey(key,7); render(); };
  const strip = el(`<div class="wk-strip"></div>`);
  const monday = weekMondayKey(key);
  for(let i=0;i<7;i++){
    const ck = addDaysKey(monday,i), cd = keyToDate(ck);
    const hasPlan = DATA.schedule && Array.isArray(DATA.schedule[ck]);
    const chip = el(`<button class="wk-chip ${ck===key?"active":""} ${ck===todayKey()?"today":""}">
      <span class="wc-dow">${DOW3[cd.getDay()]}</span><span class="wc-day">${cd.getDate()}</span>${hasPlan?`<span class="wc-dot"></span>`:""}</button>`);
    chip.onclick=()=>{ schedDate = ck; render(); };
    strip.appendChild(chip);
  }
  navRow.appendChild(prevW); navRow.appendChild(strip); navRow.appendChild(nextW);
  frag.appendChild(navRow);

  // Date jump + today + edit toggle
  const tools = el(`<div class="sched-tools"></div>`);
  const dateInp = el(`<input type="date" class="in" value="${key}" style="max-width:168px">`);
  dateInp.addEventListener("change", ()=>{ if(dateInp.value){ schedDate = dateInp.value; render(); } });
  tools.appendChild(dateInp);
  const todayBtn = el(`<button class="addbtn">Today</button>`);
  todayBtn.onclick=()=>{ schedDate=null; render(); };
  tools.appendChild(todayBtn);
  const editBtn = el(`<button class="btn ${schedEdit?"btn-primary":""}">${schedEdit?"✓ Done editing":"✎ Edit plan"}</button>`);
  editBtn.onclick=()=>{ schedEdit=!schedEdit; render(); };
  tools.appendChild(editBtn);
  frag.appendChild(tools);

  frag.appendChild(schedLegend());

  const card = el(`<div class="card"></div>`);
  if(schedEdit){
    card.appendChild(renderScheduleEditor(key));
  }else{
    const table = el(`<table class="sched"><tbody></tbody></table>`);
    const tbody = table.querySelector("tbody");
    if(!plan.items.length){
      tbody.appendChild(el(`<tr><td class="detail muted">No items yet — click “Edit plan” to add some.</td></tr>`));
    }
    plan.items.forEach(it=>{
      tbody.appendChild(el(`<tr>
        <td class="time">${esc(it.t)}</td>
        <td class="tcell"><span class="ttag" style="background:${SCHED_COLORS[it.cat]||"var(--gray)"}">${esc(it.cat)}</span></td>
        <td class="blk"><b>${esc(it.title)}</b></td>
        <td class="detail">${esc(it.detail||"")}</td>

  }
  frag.appendChild(card);
  return frag;
}

// Inline editor for one date's plan. Field edits mutate in place + save();
// structural changes (add/move/sort/delete) re-render. Editing materializes the
// date so only this date is affected.
function renderScheduleEditor(key){
  const wrap = el(`<div class="sched-editor"></div>`);
  const items = materializePlan(key);
  let dragFrom = null;

  const listEl = el(`<div class="sched-list"></div>`);
  items.forEach((it,i)=>{
    const row = el(`<div class="sched-edit" draggable="true">
      <span class="drag" title="Drag to reorder">≡</span>
      <input class="se-t" value="${esc(it.t)}" placeholder="5:45">
      <select class="se-cat">${SCHED_CATS.map(c=>`<option value="${c}"${c===it.cat?" selected":""}>${c}</option>`).join("")}</select>
      <input class="se-title" value="${esc(it.title)}" placeholder="Title">
      <input class="se-detail" value="${esc(it.detail)}" placeholder="Detail (optional)">
      <span class="se-moves"><button class="se-up" title="Move up">▲</button><button class="se-down" title="Move down">▼</button></span>
      <button class="se-del" title="Delete">✕</button>
    </div>`);
    row.querySelector(".se-t").addEventListener("change", e=>{ it.t=e.target.value; save(); });
    row.querySelector(".se-cat").addEventListener("change", e=>{ it.cat=e.target.value; save(); });
    row.querySelector(".se-title").addEventListener("change", e=>{ it.title=e.target.value; save(); });
    row.querySelector(".se-detail").addEventListener("change", e=>{ it.detail=e.target.value; save(); });
    row.querySelector(".se-up").onclick=()=>{ moveItem(items,i,i-1); save(); render(); };
    row.querySelector(".se-down").onclick=()=>{ moveItem(items,i,i+1); save(); render(); };
    row.querySelector(".se-del").onclick=()=>{ items.splice(i,1); save(); render(); };
    row.addEventListener("dragstart", ()=>{ dragFrom=i; row.classList.add("dragging"); });
    row.addEventListener("dragend", ()=>{ row.classList.remove("dragging"); });
    row.addEventListener("dragover", e=>{ e.preventDefault(); });
    row.addEventListener("drop", e=>{ e.preventDefault(); if(dragFrom!=null && dragFrom!==i){ moveItem(items, dragFrom, i); save(); render(); } dragFrom=null; });
    listEl.appendChild(row);
  });
  if(!items.length) listEl.appendChild(el(`<div class="hint">Empty — add your first item below.</div>`));
  wrap.appendChild(listEl);

  const bar = el(`<div class="sched-editbar"></div>`);
  const addBtn = el(`<button class="addbtn">+ Add item</button>`);
  addBtn.onclick=()=>{ items.push({t:"12:00", title:"New item", cat:"prep", detail:""}); save(); render(); };
  const sortBtn = el(`<button class="addbtn">Sort by time</button>`);
  sortBtn.onclick=()=>{ items.sort((a,b)=>parseTime(a.t)-parseTime(b.t)); save(); render(); };
  const resetBtn = el(`<button class="addbtn">Reset to template</button>`);
  resetBtn.onclick=()=>{ if(confirm("Discard this date's custom plan and revert to the weekday template?")){ delete DATA.schedule[key]; schedEdit=false; save(); render(); } };
  bar.appendChild(addBtn); bar.appendChild(sortBtn); bar.appendChild(resetBtn);
  wrap.appendChild(bar);

  // Copy this day's plan to other dates — plan a whole week fast.
  const copyRow = el(`<div class="sched-copy"></div>`);
  copyRow.appendChild(el(`<span class="copy-lbl">Copy this plan to:</span>`));
  const cInp = el(`<input type="date" class="in" style="max-width:160px">`);
  const cBtn = el(`<button class="addbtn">Copy to date</button>`);
  cBtn.onclick=()=>{ const t=cInp.value; if(!t){ toast("Pick a date first"); return; } DATA.schedule[t]=items.map(x=>({...x})); save(); render(); toast(`Copied to ${t}`); };
  const weekBtn = el(`<button class="addbtn">Copy to rest of week</button>`);
  weekBtn.onclick=()=>{ const mon=weekMondayKey(key); let n=0; for(let i=0;i<7;i++){ const ck=addDaysKey(mon,i); if(ck!==key){ DATA.schedule[ck]=items.map(x=>({...x})); n++; } } save(); render(); toast(`Copied to ${n} days`); };
  copyRow.appendChild(cInp); copyRow.appendChild(cBtn); copyRow.appendChild(weekBtn);
  wrap.appendChild(copyRow);

  return wrap;
}

/* ---------- PROGRESS ---------- */
function renderProgress(){
  const frag = document.createDocumentFragment();
  frag.appendChild(el(`<div><div class="page-title">Progress</div>
    <div class="page-sub">Trends, history, and the weekly review.</div></div>`));

  /* --- Weight tracking --- */
  const weights = collectWeights();
  const wCard = el(`<div class="card section-gap"><h3>Weight tracking</h3></div>`);
  const stats = weightStats(weights);
  const start = DATA.profile.startWeight, goal = DATA.profile.goalWeight;
  const strip = el(`<div class="stat-strip"></div>`);
  const cur = weights.length? weights[weights.length-1].w : start;
  strip.appendChild(statBox("Current", cur.toFixed(1), "kg"));
  strip.appendChild(statBox("To goal", (cur-goal).toFixed(1), "kg"));
  strip.appendChild(statBox("Rate", stats?(stats.lossPerWeek>=0?"-":"+")+Math.abs(stats.lossPerWeek).toFixed(2):"—", stats?"kg/wk":""));
  strip.appendChild(statBox("Est. goal date", stats&&stats.eta?stats.eta:"—", ""));
  wCard.appendChild(strip);
  wCard.appendChild(el(lineChartSVG(
    weights.map(e=>({t:dayTs(e.date), y:e.w})),
    { color:"var(--blue)", valFmt:v=>v.toFixed(1),
      refLines:[
        {y:goal, color:"var(--amber)", label:`Goal ${goal}kg`, dash:"6 4"},
        {y:start, color:"var(--gray)", label:`Start ${start}kg`, dash:"2 4"},
      ] }
  )));
  // weigh-in log
  const wlog = el(`<div class="ql-row" style="margin-top:12px;max-width:420px">
    <div style="width:150px"><label class="fld">Date</label><input class="in" type="date" id="wi-date" value="${todayKey()}"></div>
    <div class="grow"><label class="fld">Fasted weight (kg)</label><input class="in" type="number" step="0.1" id="wi-w"></div>
    <button class="btn btn-primary">Save</button>
  </div>`);
  wlog.querySelector("button").onclick=()=>{
    const dk=wlog.querySelector("#wi-date").value;
    const w=num(wlog.querySelector("#wi-w").value);
    if(!dk||w==null){ toast("Enter date and weight"); return; }
    if(!DATA.days[dk]) DATA.days[dk]=emptyDay();
    while(DATA.days[dk].m.length<7) DATA.days[dk].m.push(null);
    DATA.days[dk].m[4]=w; save(); render();
  };
  wCard.appendChild(wlog);
  frag.appendChild(wCard);

  /* --- Lift progression --- */
  const hist = collectLiftHistory();
  const exNames = Object.keys(hist).sort();
  const lCard = el(`<div class="card section-gap"><h3>Lift progression</h3></div>`);
  if(!exNames.length){
    lCard.appendChild(el(`<div class="hint">No lifts logged yet. Log a session on the Training page.</div>`));
  }else{
    if(!liftSel || !hist[liftSel]) liftSel = exNames[0];
    const sel = el(`<select class="in" style="max-width:300px;margin-bottom:12px"></select>`);
    exNames.forEach(n=>{ const o=el(`<option>${esc(n)}</option>`); if(n===liftSel)o.selected=true; sel.appendChild(o); });
    sel.onchange=()=>{ liftSel=sel.value; render(); };
    lCard.appendChild(sel);
    // PR flagging: running max of kg
    const series=hist[liftSel]; let mx=-Infinity;
    const pts=series.map(p=>{ const pr=p.kg>mx; if(p.kg>mx)mx=p.kg; return {t:dayTs(p.date), y:p.kg, pr}; });
    lCard.appendChild(el(lineChartSVG(pts, {color:"var(--green)", valFmt:v=>v.toFixed(0)+"kg"})));
    const firstVol=series[0].vol, lastVol=series[series.length-1].vol;
    const volDelta=lastVol-firstVol;
    const best=Math.max(...series.map(s=>s.kg));
    lCard.appendChild(el(`<div class="hint" style="margin-top:8px">
      Best weight: <b>${best}kg</b> · Volume trend (sets×reps×kg): ${firstVol} → ${lastVol}
      <span class="${volDelta>0?"review-yes":volDelta<0?"review-no":"muted"}">(${volDelta>=0?"+":""}${volDelta})</span>
      · <span style="color:var(--amber)">●</span> amber points = PRs.</div>`));
  }
  frag.appendChild(lCard);

  /* --- Weekly review (highlighted on Sunday) --- */
  frag.appendChild(renderWeeklyReview());

  /* --- Audit history --- */
  frag.appendChild(renderAudit());

  /* --- Backup & restore --- */
  const bCard = el(`<div class="card section-gap"><h3>Backup &amp; restore</h3>
    <div class="hint" style="margin-bottom:10px">Your data auto-saves to its file. Download a dated backup any time, or merge an old backup back in — existing days are never overwritten. A backup also downloads automatically every Sunday.</div></div>`);
  const bRow = el(`<div class="ql-row"></div>`);
  const expB = el(`<button class="btn btn-primary">Download backup</button>`);
  expB.onclick = downloadBackup;
  const impB = el(`<label class="btn" style="display:inline-block">Import / merge backup<input type="file" accept=".json" style="display:none"></label>`);
  impB.querySelector("input").onchange = e=>{ if(e.target.files[0]){ importBackupMerge(e.target.files[0]); e.target.value=""; } };
  bRow.append(expB, impB);
  bCard.appendChild(bRow);
  frag.appendChild(bCard);

  return frag;
}
function statBox(lbl,val,unit){
  return el(`<div class="stat"><div class="lbl">${lbl}</div><div class="val">${val}<span class="unit">${unit?(" "+unit):""}</span></div></div>`);
}

function renderWeeklyReview(){
  const keys = last7Keys().filter(k=>DATA.days[k]);
  const recs = keys.map(k=>DATA.days[k]);
  const isSun = dowIndex()===0;
  const card = el(`<div class="card section-gap"><h3>Weekly review${isSun?" — it's Sunday, do it now":" <span class='hint'>(shown every Sunday)</span>"}</h3></div>`);
  // computed answers
  const T = CFG().targets;
  const proteinDays = recs.filter(r=>r.m&&r.m[1]!=null);
  const proteinHit = proteinDays.filter(r=>r.m[1]>=T.protein).length;
  const stepDays = recs.filter(r=>r.m&&r.m[2]!=null);
  const stepHit = stepDays.filter(r=>r.m[2]>=T.steps).length;
  const sleepVals = recs.map(r=>r.m&&r.m[5]).filter(v=>v!=null);
  const moodVals = recs.map(r=>r.m&&r.m[6]).filter(v=>v!=null);
  const avg=a=>a.length?(a.reduce((x,y)=>x+ +y,0)/a.length):null;
  const nSupp = cfgSupps().length;
  const suppDays = recs.filter(r=>Array.isArray(r.suppl));
  const suppTaken = suppDays.reduce((a,r)=>a+r.suppl.filter(x=>x===1).length,0);
  const suppPct = suppDays.length? Math.round(suppTaken/(suppDays.length*nSupp)*100):null;
  const auto = {
    "Did I hit 164g protein every day?": proteinDays.length? `${proteinHit}/${proteinDays.length} days ${proteinHit===proteinDays.length?'<span class="review-yes">✓ every day</span>':'<span class="review-no">✗</span>'}`:`<span class="hint">no data</span>`,
    "Did I hit 10,000 steps every day?": stepDays.length? `${stepHit}/${stepDays.length} days ${stepHit===stepDays.length?'<span class="review-yes">✓ every day</span>':'<span class="review-no">✗</span>'}`:`<span class="hint">no data</span>`,
    "Average sleep quality this week (1–10)": avg(sleepVals)!=null? `<b>${avg(sleepVals).toFixed(1)}</b>`:`<span class="hint">no data</span>`,
    "Average mood / energy this week (1–10)": avg(moodVals)!=null? `<b>${avg(moodVals).toFixed(1)}</b>`:`<span class="hint">no data</span>`,
    "Supplement consistency this week": suppPct!=null? `<b>${suppPct}%</b>`:`<span class="hint">no data</span>`,
  };
  const table = el(`<table class="dtable"><thead><tr><th>Review item</th><th>Frequency</th><th class="r">This week</th></tr></thead><tbody></tbody></table>`);
  WEEKLY_REVIEW.forEach(([item,freq])=>{
    table.querySelector("tbody").appendChild(el(
      `<tr><td>${esc(item)}</td><td class="muted">${freq}</td><td class="r">${auto[item]||'<span class="hint">manual</span>'}</td></tr>`));
  });
  card.appendChild(table);
  return card;
}

function renderAudit(){
  const card = el(`<div class="card"><h3>Audit history <span class="hint">(read-only — past records are permanent)</span></h3></div>`);
  const keys = Object.keys(DATA.days).sort().reverse();
  if(!keys.length){ card.appendChild(el(`<div class="hint">No days recorded yet.</div>`)); return card; }
  if(!auditDate || !DATA.days[auditDate]) auditDate = keys[0];
  const wrap = el(`<div class="audit-wrap"></div>`);
  const list = el(`<div class="audit-list"></div>`);
  keys.forEach(k=>{
    const rec=DATA.days[k];
    const score=rec.cl?[...rec.cl].filter(c=>c==="1").length:0;
    const w=new Date(dayTs(k));
    const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][w.getDay()];
    const row=el(`<div class="audit-day ${k===auditDate?"sel":""}"><span>${dow} ${k}</span><span class="sc">${score}/21</span></div>`);
    row.onclick=()=>{ auditDate=k; render(); };
    list.appendChild(row);
  });
  wrap.appendChild(list);
  wrap.appendChild(renderRecord(auditDate));
  card.appendChild(wrap);
  return card;
}
function renderRecord(key){
  const d=DATA.days[key];
  const box=el(`<div></div>`);
  const m=d.m||[];
  const score=d.cl?[...d.cl].filter(c=>c==="1").length:0;
  const grid=el(`<div class="rec-grid"></div>`);
  const cells=[
    ["Calories", m[0]!=null?m[0].toLocaleString():"—"],
    ["Protein", m[1]!=null?m[1]+"g":"—"],
    ["Steps", m[2]!=null?(+m[2]).toLocaleString():"—"],
    ["Water", m[3]!=null?(m[3]/10).toFixed(1)+"L":"—"],
    ["Weight", m[4]!=null?m[4]+"kg":"—"],
    ["Sleep", m[5]!=null?m[5]+"h":"—"],
    ["Mood", m[6]!=null?m[6]+"/10":"—"],
    ["Checklist", score+"/21"],
  ];
  cells.forEach(([l,v])=> grid.appendChild(el(`<div class="rec-m"><div class="l">${l}</div><div class="v">${v}</div></div>`)));
  box.appendChild(grid);

  // food log — full macros per entry + day totals + non-zero micro totals
  if(d.food&&d.food.length){
    const sec=el(`<div class="rec-sec"><h4>Food log</h4></div>`);
    d.food.forEach(f=>{
      const g = f[1]!=null ? ` ${f[1]}g` : "";
      sec.appendChild(el(`<div class="rec-line hist-food">
        <span class="hf-name">${esc(f[0])}<span class="muted">${g}</span></span>
        <span class="hf-macros muted">${f[2]||0} kcal · ${f[3]||0}g prot · ${f[4]||0}g carbs · ${f[5]||0}g fat</span>
      </div>`));
    });
    const tot=foodTotals(d.food);
    const rnd=v=>Math.round(v*10)/10;
    sec.appendChild(el(`<div class="rec-line hist-food hist-total">
      <span class="hf-name">Total</span>
      <span class="hf-macros">${rnd(tot.kcal)} kcal · ${rnd(tot.protein)}g prot · ${rnd(tot.carbs)}g carbs · ${rnd(tot.fat)}g fat</span>
    </div>`));
    box.appendChild(sec);

    const micros=FOOD_MICRO_ROWS.filter(m=> tot[FOOD_KEYS[m[2]-2]]>0);
    if(micros.length){
      const ms=el(`<div class="rec-sec"><h4>Micros logged</h4></div>`);
      micros.forEach(m=>{
        const v=rnd(tot[FOOD_KEYS[m[2]-2]]);
        const tgt = m[3]!=null ? ` <span class="muted">/ ${m[3].toLocaleString()}${m[1]} target</span>` : "";
        ms.appendChild(el(`<div class="rec-line">${m[0]} <b>${v.toLocaleString()}${m[1]}</b>${tgt}</div>`));
      });
      box.appendChild(ms);
    }
  }
  // lifts
  if(d.lifts && Object.keys(d.lifts).length){
    const sec=el(`<div class="rec-sec"><h4>Lift log</h4></div>`);
    for(const s in d.lifts){
      sec.appendChild(el(`<div class="rec-line" style="font-weight:500">${esc(s)}</div>`));
      d.lifts[s].forEach(e=>{
        const sets = liftRowToSets(e).sets;
        const detail = (Array.isArray(e[4]) && e[4].length)
          ? sets.map(x=>`${x.r??"–"}×${x.kg??"–"}`).join(", ")
          : `${e[1]}×${e[2]} @ ${e[3]}kg`;
        sec.appendChild(el(`<div class="rec-line muted">${esc(e[0])} — ${esc(detail)}</div>`));
      });
    }
    box.appendChild(sec);
  }
  // supplements
  if(Array.isArray(d.suppl) && d.suppl.some(x=>x===1)){
    const taken=d.suppl.map((x,i)=>x===1?suppShort(i):null).filter(Boolean).join(", ");
    box.appendChild(el(`<div class="rec-sec"><h4>Supplements</h4><div class="rec-line muted">${esc(taken)}</div></div>`));
  }
  // note
  if(d.note){
    box.appendChild(el(`<div class="rec-sec"><h4>Reflection</h4><div class="rec-line">${esc(d.note)}</div></div>`));
  }
  return box;
}

/* ---------- Weekly nutrition summary (§ Phase 4) ---------- */
function renderWeeklyNutrition(){
  const recs = last7Keys().map(k=>DATA.days[k]).filter(r=>r && r.m);
  const calDays = recs.filter(r=>r.m[0]!=null && r.m[0]>0);
  const protDays = recs.filter(r=>r.m[1]!=null && r.m[1]>0);
  const avg=a=>a.length? a.reduce((x,y)=>x+y,0)/a.length : null;
  const avgCal = avg(calDays.map(r=>r.m[0]));
  const avgProt = avg(protDays.map(r=>r.m[1]));
  const protT = CFG().targets.protein;
  const weeklyCal = weeklyAvgMacros().cal;
  const protHit = protDays.filter(r=>r.m[1]>=protT).length;
  const card = el(`<div class="card section-gap"><h3>Weekly nutrition summary <span class="hint">(last 7 days)</span></h3></div>`);
  if(!recs.length){ card.appendChild(el(`<div class="hint">Log food to see your weekly summary.</div>`)); return card; }
  const strip = el(`<div class="stat-strip"></div>`);
  strip.appendChild(statBox("Avg calories", avgCal!=null?Math.round(avgCal).toLocaleString():"—", "kcal"));
  strip.appendChild(statBox("Avg protein", avgProt!=null?Math.round(avgProt):"—", "g"));
  strip.appendChild(statBox(`${protT}g days`, `${protHit}/${protDays.length||0}`, ""));
  strip.appendChild(statBox("vs weekly avg", avgCal!=null?(avgCal-weeklyCal>=0?"+":"")+Math.round(avgCal-weeklyCal):"—", "kcal"));
  card.appendChild(strip);
  if(avgProt!=null) card.appendChild(bar("Avg protein vs target", Math.round(avgProt), protT, "var(--green)", "g"));
  if(avgCal!=null) card.appendChild(bar("Avg calories vs ~weekly avg", Math.round(avgCal), weeklyCal, "var(--blue)", "kcal"));
  card.appendChild(el(`<div class="hint" style="margin-top:8px">Weekly calorie average target is ~${weeklyCal.toLocaleString()} kcal across the carb-cycling week. Protein target is ${protT}g every single day.</div>`));
  return card;
}

  frag.appendChild(el(`<div><div class="page-title">My Rules</div>
    <div class="page-sub">The 5 non-negotiables. Read-only. Always accessible.</div></div>`));

  const why = el(`<div class="card section-gap"><h3>The bigger why</h3></div>`);

/* ---------- SETTINGS ---------- */
function renderSettings(){
  const frag = document.createDocumentFragment();
  frag.appendChild(el(`<div><div class="page-title">Settings</div>
    <div class="page-sub">Tune your parameters. Everything here saves into your data file.</div></div>`));

  // helper: labelled number input that writes obj[key] on change
  const field = (label, val, onSet, opts={}) => {
    const wrap = el(`<div><label class="fld">${esc(label)}</label></div>`);
    const inp = el(`<input class="in" type="${opts.type||"number"}" ${opts.step?`step="${opts.step}"`:""} value="${val==null?"":val}">`);
    inp.addEventListener("change", ()=>{
      const v = (opts.type==="date"||opts.type==="text") ? inp.value : num(inp.value);
      onSet(v); save(); if(opts.rerender) render();
    });
    wrap.appendChild(inp);
    return wrap;
  };

  const P = DATA.profile, C = CFG(), T = C.targets;

  // --- Profile ---
  const prof = el(`<div class="card section-gap"><h3>Profile</h3></div>`);
  const pg = el(`<div class="set-grid four"></div>`);
  pg.appendChild(field("Start weight (kg)", P.startWeight, v=>P.startWeight=v, {step:"0.1"}));
  pg.appendChild(field("Goal weight (kg)", P.goalWeight, v=>P.goalWeight=v, {step:"0.1", rerender:true}));
  pg.appendChild(field("Height (cm)", P.height, v=>P.height=v));
  pg.appendChild(field("Start date", P.startDate, v=>P.startDate=v, {type:"date"}));
  prof.appendChild(pg);
  frag.appendChild(prof);

  // --- Daily targets ---
  const tg = el(`<div class="card section-gap"><h3>Daily targets</h3></div>`);
  const tgg = el(`<div class="set-grid four"></div>`);
  tgg.appendChild(field("Protein (g)", T.protein, v=>T.protein=v, {rerender:true}));
  tgg.appendChild(field("Steps", T.steps, v=>T.steps=v, {rerender:true}));
  tgg.appendChild(field("Water (L)", (T.water/10), v=>T.water=Math.round((v||0)*10), {step:"0.1", rerender:true}));
  tgg.appendChild(field("Sleep (h)", T.sleep, v=>T.sleep=v, {step:"0.5", rerender:true}));
  tg.appendChild(tgg);
  frag.appendChild(tg);

  // --- Day-type macros ---
  const dm = el(`<div class="card section-gap"><h3>Day-type macros</h3></div>`);
  const dmTable = el(`<table class="dtable">
    <thead><tr><th>Day type</th><th class="r">Calories</th><th class="r">Carbs (g)</th><th class="r">Fat (g)</th></tr></thead>
    <tbody></tbody></table>`);
  const dmBody = dmTable.querySelector("tbody");
  [["high","High carb"],["medium","Medium carb"],["low","Low carb"]].forEach(([k,lab])=>{
    const dtc = C.dayTypes[k];
    const tr = el(`<tr><td style="font-weight:500">${lab}</td>
      <td class="r"><input class="micro-in" type="number" value="${dtc.cal}" data-f="cal"></td>
      <td class="r"><input class="micro-in" type="number" value="${dtc.carbs}" data-f="carbs"></td>
      <td class="r"><input class="micro-in" type="number" value="${dtc.fat}" data-f="fat"></td></tr>`);
    tr.querySelectorAll("input").forEach(inp=> inp.addEventListener("change", ()=>{
      const v=num(inp.value); if(v!=null) dtc[inp.dataset.f]=v; save(); render();
    }));
    dmBody.appendChild(tr);
  });
  dm.appendChild(dmTable);
  dm.appendChild(el(`<div class="hint" style="margin-top:8px">Protein per day equals the daily protein target above. Day type is auto-detected from the weekday.</div>`));
  frag.appendChild(dm);

  // --- Supplements (editable list) ---
  const sup = el(`<div class="card section-gap"><h3>Supplements <span class="hint">(tracker = these, in order)</span></h3></div>`);
  const supWrap = el(`<div></div>`);
  supWrap.appendChild(el(`<div class="supp-edit"><span class="hdr">Name</span><span class="hdr">Short</span><span class="hdr">Dose</span><span class="hdr">When</span><span></span></div>`));
  C.supplements.forEach((s,i)=>{
    const row = el(`<div class="supp-edit"></div>`);
    const mk = (key,ph)=>{ const inp=el(`<input value="${esc(s[key]||"")}" placeholder="${ph}">`);
      inp.addEventListener("change", ()=>{ s[key]=inp.value; save(); }); return inp; };
    row.appendChild(mk("name","Name"));
    row.appendChild(mk("short","Short"));
    row.appendChild(mk("dose","Dose"));
    row.appendChild(mk("when","When"));
    const del = el(`<button class="del" title="Remove">×</button>`);
    del.onclick = ()=>{
      C.supplements.splice(i,1);
      // drop the matching bit from every day's suppl array
      for(const key in DATA.days){ const r=DATA.days[key]; if(Array.isArray(r.suppl)) r.suppl.splice(i,1); }
      save(); render();
    };
    row.appendChild(del);
    supWrap.appendChild(row);
  });
  sup.appendChild(supWrap);
  const addBtn = el(`<button class="btn" style="margin-top:6px">+ Add supplement</button>`);
  addBtn.onclick = ()=>{
    C.supplements.push({name:"New supplement", short:"New", dose:"", when:"", why:""});
    for(const key in DATA.days){ const r=DATA.days[key]; if(Array.isArray(r.suppl)) r.suppl.push(0); }
    save(); render();
  };
  sup.appendChild(addBtn);
  sup.appendChild(el(`<div class="warn">⚠ Adding, removing, or reordering supplements changes how past days' toggles are interpreted — the tracker is positional. Best done before you have much history.</div>`));
  frag.appendChild(sup);

  // --- Obsidian export ---
  const ob = C.obsidian;
  const obc = el(`<div class="card section-gap"><h3>Obsidian export <span class="hint">(auto-writes notes to your vault on every save)</span></h3></div>`);
  const enRow = el(`<label class="ob-toggle"><input type="checkbox" ${ob.enabled?"checked":""}> Enable auto-export to Obsidian</label>`);
  enRow.querySelector("input").addEventListener("change", e=>{ ob.enabled=e.target.checked; save(); render(); });
  obc.appendChild(enRow);
  const og = el(`<div class="set-grid four" style="margin-top:10px"></div>`);
  og.appendChild(field("Vault path", ob.vaultPath, v=>ob.vaultPath=v, {type:"text"}));
  og.appendChild(field("Training folder", ob.trainingFolder, v=>ob.trainingFolder=v||"Training", {type:"text"}));
  og.appendChild(field("Food folder", ob.foodFolder, v=>ob.foodFolder=v||"Food", {type:"text"}));
  obc.appendChild(og);
  const obBtns = el(`<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"></div>`);
  const status = el(`<div class="hint" style="margin-top:8px"></div>`);
  const testBtn = el(`<button class="btn">Test connection</button>`);
  testBtn.onclick = async ()=>{
    status.textContent = "Checking…";
    try{
      const r = await fetch("/api/obsidian/check?path="+encodeURIComponent(ob.vaultPath||""));
      const j = await r.json();
      status.innerHTML = j.exists
        ? `<span class="okflag">✓ Vault folder found</span> — ${esc(ob.vaultPath)}`
        : `<span class="gapflag">✗ Folder not found</span> — check the path. ${esc(ob.vaultPath)}`;
    }catch(e){ status.innerHTML = `<span class="gapflag">✗ Server offline</span> — start the app server first.`; }
  };
  const syncBtn = el(`<button class="btn btn-primary">Sync all days now</button>`);
  syncBtn.onclick = async ()=>{
    const keys = Object.keys(DATA.days).sort();
    status.textContent = `Exporting ${keys.length} day${keys.length===1?"":"s"}…`;
    try{
      const j = await pushObsidian(keys, {withHubs:true});
      status.innerHTML = `<span class="okflag">✓ Exported ${j.written} note${j.written===1?"":"s"}</span>${j.skipped?` · ${j.skipped} skipped (already present)`:""} → ${esc(ob.vaultPath)}`;
      toast(`Exported ${j.written} notes`);
    }catch(e){ status.innerHTML = `<span class="gapflag">✗ ${esc(e.message||"Export failed")}</span>`; }
  };
  obBtns.appendChild(testBtn); obBtns.appendChild(syncBtn);
  obc.appendChild(obBtns);
  obc.appendChild(status);
  obc.appendChild(el(`<div class="hint" style="margin-top:10px">Writes two notes per day — <b>${esc(ob.trainingFolder)}/YYYY-MM-DD.md</b> and <b>${esc(ob.foodFolder)}/YYYY-MM-DD.md</b> — plus <b>Training</b>, <b>Food</b> &amp; <b>Sport</b> hub notes that link into your vault. The app server must be running. Auto-export covers today's notes on save; use <b>Sync all days</b> to backfill past days.</div>`));
  frag.appendChild(obc);

  // --- Phone sync (GitHub) ---
  const sc = C.sync;
  const syc = el(`<div class="card section-gap"><h3>Phone sync (GitHub) <span class="hint">(log on your phone → flows into saves + Obsidian)</span></h3></div>`);
  const syEn = el(`<label class="ob-toggle"><input type="checkbox" ${sc.enabled?"checked":""}> Enable GitHub sync (${storeMode==="cloud"?"phone/cloud":"desktop"} mode)</label>`);
  syEn.querySelector("input").addEventListener("change", e=>{ sc.enabled=e.target.checked; saveLocalSyncCfg(sc); save(); render(); });
  syc.appendChild(syEn);
  const syg = el(`<div class="set-grid" style="margin-top:10px"></div>`);
  syg.appendChild(field("Private data repo (owner/name)", sc.repo, v=>{ sc.repo=(v||"").trim(); saveLocalSyncCfg(sc); }, {type:"text"}));
  syg.appendChild(field("Branch", sc.branch, v=>{ sc.branch=(v||"main").trim(); saveLocalSyncCfg(sc); }, {type:"text"}));
  // Token field — stored in localStorage (phone) and pushed to the PC's sync-config.json (desktop).
  const tokW = el(`<div><label class="fld">Fine-grained token (Contents: R/W on that repo)</label></div>`);
  const tokI = el(`<input class="in" type="password" placeholder="${ghToken()?"•••••• (saved on this device)":"ghp_… / github_pat_…"}">`);
  tokI.addEventListener("change", async ()=>{
    const t=tokI.value.trim(); if(!t) return;
    try{ localStorage.setItem("lifeOS-gh-token", t); }catch(e){}
    if(storeMode==="server"){
      try{ await fetch("/api/sync/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({repo:sc.repo,branch:sc.branch,token:t,dataPath:sc.dataPath,foodsPath:sc.foodsPath})}); }catch(e){}
    }
    tokI.value=""; toast("Token saved on this device"); render();
  });
  tokW.appendChild(tokI);
  syg.appendChild(tokW);
  syc.appendChild(syg);
  const syBtns = el(`<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"></div>`);
  const syStatus = el(`<div class="hint" style="margin-top:8px">${esc(lastSyncInfo||"")}</div>`);
  const syTest = el(`<button class="btn">Test connection</button>`);
  syTest.onclick = async ()=>{
    syStatus.textContent="Checking…";
    try{ const rem=await syncFetchRemote(); syStatus.innerHTML=`<span class="okflag">✓ Connected</span> — repo reachable${rem.data?` (data file found)`:` (no data file yet — first push will create it)`}`; }
    catch(e){ syStatus.innerHTML=`<span class="gapflag">✗ ${esc(e.message)}</span>`; }
  };
  const sySync = el(`<button class="btn btn-primary">Sync now</button>`);
  sySync.onclick = async ()=>{
    syStatus.textContent="Syncing…";
    const up=await syncPush(); const dn=await syncPull();
    syStatus.innerHTML = (up.ok&&dn.ok) ? `<span class="okflag">✓ Synced</span> — ${esc(lastSyncInfo)}` : `<span class="gapflag">✗ ${esc((up.error||dn.error)||"sync failed")}</span>`;
  };
  syBtns.appendChild(syTest); syBtns.appendChild(sySync);
  syc.appendChild(syBtns);
  syc.appendChild(syStatus);
  syc.appendChild(el(`<div class="hint" style="margin-top:10px">Data syncs through a <b>private</b> GitHub repo. Your token is stored only on this device (never in the synced data). On the phone it's used directly; on the desktop it's saved to <code>sync-config.json</code> and used by the local server. See <code>MOBILE-SETUP.md</code>.</div>`));
  frag.appendChild(syc);

  // --- Reset ---
  const reset = el(`<div class="card"><h3>Reset</h3></div>`);
  const rb = el(`<button class="btn">Reset all parameters to defaults</button>`);
  rb.onclick = ()=>{
    if(!confirm("Reset profile targets, day-type macros, and the supplement list to defaults? Your logged days are not affected.")) return;
    DATA.config = { targets:Object.assign({},DEFAULTS.targets),
                    dayTypes:JSON.parse(JSON.stringify(DEFAULTS.dayTypes)),
                    supplements:DEFAULTS.supplements.map(s=>Object.assign({},s)) };
    save(); render(); toast("Reset to defaults");
  };
  reset.appendChild(rb);
  frag.appendChild(reset);

  return frag;
}

/* ---------- Fallback placeholder ---------- */
function renderPlaceholder(page){
  return el(`<div class="placeholder"><div class="ph-title">Not found</div>
    <div class="hint">Unknown page.</div></div>`);
}

/* ---------- Init ---------- */
// Register the service worker so the app installs + works offline (PWA).
if("serviceWorker" in navigator){ try{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }catch(e){} }
// Auto-load data + foods from the local server, then poll the server every 30s.
initApp();
checkServer();
setInterval(checkServer, 30000);
// Catch the 21:00 boundary (Feature C) while the app is left open.
setInterval(tickTimeFeatures, 60000);
// Periodic background pull from GitHub (re-renders only if something changed).
setInterval(()=>{ if(DATA && syncEnabled() && !syncing) syncPull({silent:true}).then(r=>{ if(r && r.ok && r.changed && r.changed.length) render(); }); }, 90000);

// Keyboard shortcuts.
window.addEventListener("keydown", e=>{
  // Escape → dismiss the morning briefing (Feature A)
  if(e.key==="Escape" && document.getElementById("briefing")){ dismissBriefing(); return; }
  // Ctrl/Cmd+S → force an immediate save to the server.
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="s"){
    e.preventDefault();
    if(DATA) postData();
  }
});
</script>
